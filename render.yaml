services:
  - type: web
    name: campus-lost-found-backend
    runtime: python
    pythonVersion: "3.11"
    startCommand: "gunicorn -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT --workers 4"
    buildCommand: "pip install -r backend/requirements.txt"
    rootDir: "backend"
    
    envVars:
      - key: DATABASE_URL
        scope: RENDER_INSTANCE_ID
        # Set this to your Render PostgreSQL database connection string
        # Format: postgresql://user:password@hostname:port/database_name
      - key: ALLOWED_ORIGINS
        value: "http://localhost:3000,https://your-frontend-domain.vercel.app"
        # Update this with your actual Vercel frontend URL
      - key: JWT_SECRET
        generateValue: true
        # Render will auto-generate this
      - key: ENVIRONMENT
        value: "production"
      - key: WORKERS
        value: "4"

databases:
  - name: campus-lost-found-db
    databaseName: campus_lost_found
    user: campus_user
    # Connection string will be automatically provided as DATABASE_URL env var
