name: Deploy Frontend with GitHub Actions

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Warn if FRONTEND_API_URL missing
        run: |
          if [ -z "${{ secrets.FRONTEND_API_URL }}" ]; then
            echo "WARN: FRONTEND_API_URL secret is not set; build will use default API resolution in the app."
          else
            echo "FRONTEND_API_URL provided. Proceeding with build."
          fi

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.FRONTEND_API_URL }}
        run: npm run build

      - name: Disable Jekyll
        run: touch frontend/dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5

      - name: Print deployed GitHub Pages URL
        run: |
          echo "GitHub Pages frontend should be available at:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
