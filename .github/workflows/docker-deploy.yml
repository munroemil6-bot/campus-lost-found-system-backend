name: Docker Build and Push

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/campus-lostfound
  BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-backend
  FRONTEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-frontend
  ROOT_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-root
  API_URL: http://localhost:8000

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v5
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ env.API_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build and push root landing image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Dockerfile.root
          push: true
          tags: |
            ${{ env.ROOT_IMAGE }}:latest
            ${{ env.ROOT_IMAGE }}:${{ github.sha }}

      - name: Output pushed image names
        run: |
          echo "Backend image: $BACKEND_IMAGE:latest"
          echo "Frontend image: $FRONTEND_IMAGE:latest"
          echo "Root landing image: $ROOT_IMAGE:latest"
